# PR Auto-Improvement
prProcessor:
  enabled: true
  schedule: "*/15 * * * *"    # 15분마다 체크
  cooldownHours: 6            # 처리 후 6시간 대기
  maxIterations: 3            # Worker-Reviewer 최대 3회 반복
