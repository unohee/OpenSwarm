title: "[Idea] "
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for OpenSwarm! Please fill out the sections below so the community and maintainers can evaluate it.

        - If you have a concrete bug, please open an [Issue](../../issues/new/choose) instead.
        - If you have a usage question, please use the **Q&A** category.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this idea solve? Describe it independently of any specific external tool.
      placeholder: When I try to ..., OpenSwarm currently ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How would you like OpenSwarm to behave? Rough sketches, API shapes, or CLI examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Include at least one approach that does not depend on a specific external service.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of OpenSwarm does this affect?
      options:
        - Adapter (Claude / GPT / Codex / Ollama / LMStudio / llama.cpp / other)
        - CLI / UX
        - Worker / Reviewer pipeline
        - Memory (LanceDB)
        - Integrations (Linear / Discord / etc.)
        - Configuration / Setup
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Briefly describe how you would actually use this in your workflow.

  - type: checkboxes
    id: disclosure
    attributes:
      label: Conflict of Interest Disclosure
      description: Do you maintain or have affiliation with any project, product, or service mentioned in this proposal?
      options:
        - label: I have no conflict of interest related to this proposal.
        - label: I have a relevant affiliation and have disclosed it in the description above.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing discussions and issues to confirm this is not a duplicate.
          required: true
        - label: I have read the CONTRIBUTING guidelines.
          required: true
