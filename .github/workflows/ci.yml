name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      # Verification runs each command inside an OS sandbox and fails closed
      # when it cannot get one. On Linux that sandbox is bubblewrap, which the
      # runner image does not ship, so without this every verify test reports
      # "OS verification sandbox is unavailable". macOS uses built-in
      # sandbox-exec and needs no install.
      - name: Install the Linux verification sandbox
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          # ubuntu-24.04 images restrict unprivileged user namespaces through
          # AppArmor; without lifting it bwrap cannot set up the network
          # namespace and every sandboxed command dies with
          # "loopback: Failed RTM_NEWADDR: Operation not permitted".
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          bwrap --ro-bind / / --unshare-net --dev /dev --proc /proc -- /bin/sh -lc 'echo sandbox-ok'
      - run: npm ci
      # Coverage thresholds live in vitest.config.ts (ratcheted floor below the
      # measured baseline — see that file's comment). Previously `npm test` had
      # no --coverage flag anywhere in CI, so the threshold was configured but
      # never actually enforced.
      - run: npm run test:coverage

  loc-gate:
    name: LOC Warning (800 lines)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check file sizes
        run: |
          for file in $(find src -name "*.ts" -type f); do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 800 ]; then
              echo "::warning file=$file::File exceeds 800 lines ($lines)"
            fi
          done
